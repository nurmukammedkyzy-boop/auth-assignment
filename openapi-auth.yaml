openapi: 3.0.0
info:
  title: Simple Auth API
  version: 1.0.0
  description: Authentication endpoints for login, registration, and password reset.
paths:
  /login:
    post:
      summary: User login
      description: Authenticates a user with username and password. Returns an access
        token on success.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - username
              - password
              properties:
                username:
                  type: string
                  example: john_doe
                password:
                  type: string
                  format: password
                  example: SecurePass123
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Login successful
                  token:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
              examples:
                success:
                  value:
                    message: Login successful
                    token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Invalid username or password
              examples:
                failure:
                  value:
                    error: Invalid username or password
  /registration:
    post:
      summary: User registration
      description: Creates a new user account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - username
              - email
              - password
              properties:
                username:
                  type: string
                  example: john_doe
                email:
                  type: string
                  format: email
                  example: john@example.com
                password:
                  type: string
                  format: password
                  example: SecurePass123
      responses:
        '200':
          description: Successful registration
          content:
            application/json:
              examples:
                success:
                  value:
                    message: Registration successful
                    userId: 101
        '401':
          description: Registration failed
          content:
            application/json:
              examples:
                failure:
                  value:
                    error: User already exists or invalid input
  /reset-password:
    post:
      summary: Reset password
      description: Sends a password reset link or code to the user email.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - email
              properties:
                email:
                  type: string
                  format: email
                  example: john@example.com
      responses:
        '200':
          description: Reset request accepted
          content:
            application/json:
              examples:
                success:
                  value:
                    message: Password reset instructions sent
        '401':
          description: Reset request failed
          content:
            application/json:
              examples:
                failure:
                  value:
                    error: Email address not found
